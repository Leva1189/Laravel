version: '3'
services:

  #PHP Service
  php:
    build:
      context: .
      dockerfile: etc/Dockerfile
    container_name: 'php'
    volumes:
      - ./src:/var/www/laravel
      - ./etc/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    restart: always

  #Nginx Service
  webserver:
    image: nginx:latest
    container_name: 'webserver'
    ports:
      - "80:80"
    volumes:
      - ./src:/var/www/laravel
      - ./etc/config:/var/configs
    command: /bin/sh -c "cp /var/configs/nginx.conf /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"
    restart: always

  #MySQL Service
  db:
    image: mysql:latest
    container_name: 'dblaravel'
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: dblaravel
      MYSQL_ROOT_PASSWORD: test
      MYSQL_USER: user
      MYSQL_PASSWORD: test
      restart: always
